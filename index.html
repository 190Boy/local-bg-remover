<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瀏覽器 AI 去背工具</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪄</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-6 text-center">
    <div class="max-w-2xl w-full bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700">
        <h1 class="text-4xl font-extrabold mb-2 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">AI 去背展示</h1>
        <p class="text-slate-400 text-sm mb-8">圖片在本機處理，不上傳。首次使用需下載 70MB 模型。</p>

        <div id="upload-box" class="border-2 border-dashed border-slate-600 rounded-2xl p-10 hover:border-blue-500 cursor-pointer transition-all">
            <input type="file" id="image-input" class="hidden" accept="image/*">
            <p class="text-lg">點擊或拖曳圖片到這裡</p>
        </div>

        <div id="loading" class="hidden mt-6">
            <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500 mx-auto mb-4"></div>
            <p id="progress-text" class="text-blue-400 font-mono">正在檢查組件...</p>
        </div>

        <div id="result-container" class="hidden mt-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <img id="orig-preview" class="rounded h-48 w-full object-contain bg-black border border-slate-700">
                <div class="rounded h-48 w-full border border-slate-700 bg-[url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMUlEQVQ4T2NkYGAQYcAP3uPBAp86gYFpSDeJlEwzGBgY0A3ZQCIsD0hzJ5EUC2Y8uOAAKI9NG96S7uAAAAAASUVORK5CYII=')]">
                    <img id="result-preview" class="h-full w-full object-contain">
                </div>
            </div>
            <button id="download-btn" class="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-xl font-bold w-full transition shadow-lg">下載 PNG</button>
            <button onclick="location.reload()" class="text-slate-500 text-sm mt-4 hover:text-white transition">重新上傳</button>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const uploadBox = document.getElementById('upload-box');
        const loading = document.getElementById('loading');
        const resultContainer = document.getElementById('result-container');
        const progressText = document.getElementById('progress-text');

        // 拖曳修復：確保攔截預設行為
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(name => {
            uploadBox.addEventListener(name, e => e.preventDefault());
        });

        uploadBox.addEventListener('dragover', () => uploadBox.classList.add('bg-slate-700'));
        uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('bg-slate-700'));
        uploadBox.addEventListener('drop', (e) => {
            uploadBox.classList.remove('bg-slate-700');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        uploadBox.onclick = () => imageInput.click();
        imageInput.onchange = (e) => { if(e.target.files.length) handleFile(e.target.files[0]); };

        // 核彈級加載法：手動注入 Script 並監聽完成
        function loadScript(url) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = url;
                script.onload = () => resolve();
                script.onerror = () => reject();
                document.head.appendChild(script);
            });
        }

        async function handleFile(file) {
            document.getElementById('orig-preview').src = URL.createObjectURL(file);
            uploadBox.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                // 1. 動態確認組件是否載入，沒載入就現在抓
                if (!(window.imgly && window.imgly.backgroundRemoval)) {
                    progressText.innerText = "正在連線至 CDN...";
                    await loadScript("https://unpkg.com/@imgly/background-removal@1.4.3/dist/index.js");
                }

                // 2. 再次確認變數名稱
                const removeFn = window.imgly && window.imgly.backgroundRemoval;
                if (!removeFn) throw new Error("組件載入異常，請重新整理頁面。");

                const config = {
                    publicPath: "https://unpkg.com/@imgly/background-removal@1.4.3/dist/",
                    progress: (key, current, total) => {
                        const percent = total ? Math.round((current / total) * 100) : 0;
                        progressText.innerText = `下載 AI 模型: ${percent}%`;
                    }
                };

                // 3. 執行
                const blob = await removeFn(file, config);
                const url = URL.createObjectURL(blob);
                document.getElementById('result-preview').src = url;
                loading.classList.add('hidden');
                resultContainer.classList.remove('hidden');

                document.getElementById('download-btn').onclick = () => {
                    const a = document.createElement('a');
                    a.href = url; a.download = "no-bg.png"; a.click();
                };
            } catch (error) {
                console.error(error);
                alert("錯誤: " + error.message);
                uploadBox.classList.remove('hidden');
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
