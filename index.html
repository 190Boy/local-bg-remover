<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>純本地端去背工具 - 免費無限次</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪄</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-2xl w-full bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold mb-2 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                無限量去背工具
            </h1>
            <p class="text-slate-400">本地端 AI 運算：隱私安全、完全免費、無次數限制</p>
        </div>

        <div id="upload-box" class="relative border-2 border-dashed border-slate-600 rounded-2xl p-10 text-center hover:border-blue-500 transition-colors cursor-pointer group">
            <input type="file" id="image-input" class="hidden" accept="image/*">
            <div id="status-text">
                <div class="text-5xl mb-4">🖼️</div>
                <p class="text-lg">點擊或拖曳圖片到這裡</p>
                <p class="text-sm text-slate-500 mt-2">首次執行會下載 AI 模型 (約 70MB)，請耐心等候</p>
            </div>
        </div>

        <div id="loading" class="hidden mt-6 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500 mb-4"></div>
            <p id="progress-text" class="text-blue-400 font-mono">載入 AI 模組中...</p>
        </div>

        <div id="result-container" class="hidden mt-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <p class="text-xs text-slate-500 mb-2 uppercase tracking-widest">原始圖片</p>
                    <img id="orig-preview" class="rounded-lg border border-slate-700 w-full object-contain h-48 bg-slate-900">
                </div>
                <div>
                    <p class="text-xs text-slate-500 mb-2 uppercase tracking-widest">去背結果</p>
                    <div class="rounded-lg border border-slate-700 w-full h-48 bg-[url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMUlEQVQ4T2NkYGAQYcAP3uPBAp86gYFpSDeJlEwzGBgY0A3ZQCIsD0hzJ5EUC2Y8uOAAKI9NG96S7uAAAAAASUVORK5CYII=')]">
                        <img id="result-preview" class="w-full h-full object-contain">
                    </div>
                </div>
            </div>
            <div class="flex gap-4">
                <button id="download-btn" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition shadow-lg">下載 PNG</button>
                <button onclick="location.reload()" class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-xl transition">重新上傳</button>
            </div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const uploadBox = document.getElementById('upload-box');
        const loading = document.getElementById('loading');
        const resultContainer = document.getElementById('result-container');
        const resultPreview = document.getElementById('result-preview');
        const origPreview = document.getElementById('orig-preview');
        const downloadBtn = document.getElementById('download-btn');
        const progressText = document.getElementById('progress-text');

        // 點擊事件
        uploadBox.onclick = () => imageInput.click();
        imageInput.onchange = (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        };

        // 拖曳事件
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('border-blue-500', 'bg-slate-700');
        });
        uploadBox.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('border-blue-500', 'bg-slate-700');
        });
        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('border-blue-500', 'bg-slate-700');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        // 核心去背邏輯
        async function handleFile(file) {
            origPreview.src = URL.createObjectURL(file);
            uploadBox.classList.add('hidden');
            loading.classList.remove('hidden');
            progressText.innerText = "載入 AI 模組中...";

            try {
                // 【轉址修正】明確鎖定 @1.7.0 版本，徹底解決 CORS 被擋的問題
                const imglyModule = await import("https://unpkg.com/@imgly/background-removal@1.7.0/dist/imgly-background-removal.esm.js");
                const removeBackground = imglyModule.default;

                const config = {
                    // 【轉址修正】路徑也同步鎖定 @1.7.0
                    publicPath: "https://unpkg.com/@imgly/background-removal@1.7.0/dist/",
                    progress: (status, progress) => {
                        progressText.innerText = `狀態: ${status} - ${Math.round(progress * 100)}%`;
                    }
                };

                const blob = await removeBackground(file, config);
                
                const url = URL.createObjectURL(blob);
                resultPreview.src = url;
                loading.classList.add('hidden');
                resultContainer.classList.remove('hidden');

                downloadBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `removed_bg_${Date.now()}.png`;
                    a.click();
                };

            } catch (error) {
                console.error("去背詳細錯誤:", error);
                alert(`去背失敗！請按 F12 查看主控台。\n錯誤訊息: ${error.message}`);
            }
        }
    </script>
</body>
</html>
