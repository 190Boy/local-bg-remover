<script type="module">
        import imglyRemoveBackground from "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.3/dist/imgly-background-removal.esm.js";

        const imageInput = document.getElementById('image-input');
        const uploadBox = document.getElementById('upload-box');
        const loading = document.getElementById('loading');
        const resultContainer = document.getElementById('result-container');
        const resultPreview = document.getElementById('result-preview');
        const origPreview = document.getElementById('orig-preview');
        const downloadBtn = document.getElementById('download-btn');

        // ====== 1. 點擊上傳事件 ======
        uploadBox.onclick = () => imageInput.click();

        imageInput.onchange = (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        };

        // ====== 2. 拖曳上傳事件 (修復瀏覽器直接開啟圖片的問題) ======
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault(); // 阻止瀏覽器預設動作
            uploadBox.classList.add('border-blue-500', 'bg-slate-700'); // 拖曳進入時給點變色回饋
        });

        uploadBox.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('border-blue-500', 'bg-slate-700'); // 拖曳離開時恢復原色
        });

        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault(); // 阻止瀏覽器預設動作
            uploadBox.classList.remove('border-blue-500', 'bg-slate-700');
            
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]); // 抓取拖曳進來的第一個檔案
            }
        });

        // ====== 3. 核心處理邏輯 ======
        async function handleFile(file) {
            origPreview.src = URL.createObjectURL(file);
            uploadBox.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                // 強制指定 AI 模型的下載路徑為官方 CDN
                const config = {
                    publicPath: "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.3/dist/",
                    progress: (status, progress) => {
                        document.getElementById('progress-text').innerText = `狀態: ${status} - ${Math.round(progress * 100)}%`;
                    }
                };

                // 執行去背
                const blob = await imglyRemoveBackground(file, config);
                
                const url = URL.createObjectURL(blob);
                resultPreview.src = url;
                loading.classList.add('hidden');
                resultContainer.classList.remove('hidden');

                downloadBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `removed_bg_${Date.now()}.png`;
                    a.click();
                };

            } catch (error) {
                // 【修復】取消自動重新整理，並將錯誤印在主控台
                console.error("去背詳細錯誤:", error);
                alert(`去背失敗！請按 F12 查看主控台。\n錯誤訊息: ${error.message}`);
                // location.reload(); 
            }
        }
    </script>
